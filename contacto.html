<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/index.css">
  <title>E.E.S. N° 59 | Contacto e Inscripción</title>
</head>

<body class="fondo-telefono">
  <header>
    <img src="imagenes/logo.png" alt="Logo de la Escuela de Educación Secundaria N° 59" class="logo">

    <div class="info-escuela">
      <h1>E.E.S. N° 59</h1>
      <h2>Modalidad: Ciencias Naturales</h2>
    </div>

    <nav aria-label="Menú principal de navegación">
      <ul>
        <li><a href="index.html">Inicio</a></li>
        <li><a href="sobre_nosotros.html">Sobre Nosotros</a></li>
        <li><a href="cursos_y_materias.html">Cursos y Materias</a></li>
        <li><a href="canciones_patrias.html">Canciones Patrias</a></li>
        <li><a href="contacto.html">Contacto</a></li>
      </ul>
    </nav>
  </header>

  <main class="contacto">
    <section class="formulario-unificado">
      <h2>Contacto e Inscripción</h2>

      <!-- Bloque de Inscripción -->
      <details class="bloque" aria-label="Solicitud de inscripción">
        <summary>Solicitud de Inscripción</summary>

        <form class="form-inscripcion">
          <label>Nombre y Apellido:</label>
          <input type="text" name="nombre" required>

          <label>DNI:</label>
          <input type="number" name="nombre" required>

          <label>Curso al que desea inscribirse:</label>
          <select required>
            <option value="">Seleccione una opción</option>
            <option>1° Año</option>
            <option>2° Año</option>
            <option>3° Año</option>
            <option>4° Año</option>
            <option>5° Año</option>
            <option>6° Año</option>
          </select>

          <label>Correo electrónico:</label>
          <input type="email" name="email" required>

          <label>Teléfono:</label>
          <input type="tel" name="tel">

          <button type="submit">Enviar Solicitud</button>
        </form>
      </details>

      <!-- Bloque de Contacto -->
      <details class="bloque" aria-label="Formulario de contacto">
        <summary>Contacto</summary>

        <form class="form-contacto">
          <label>Nombre:</label>
          <input type="text" name="name" required>

          <label>Correo electrónico:</label>
          <input type="email" name="email" required>

          <label>Mensaje o comentario:</label>
          <textarea rows="5" required></textarea>

          <button type="submit">Enviar mensaje</button>
        </form>
      </details>
    </section>
 
  </main>
 
  <footer>
    <p>© 2026 E.E.S. N° 59 - Todos los derechos reservados.</p>
    <p class="footer-autor">Desarrollado por <strong>Elías Daniel Díaz</strong></p>
  </footer>

  <script src="js/script.js"></script>
</body>

</html>
